# 简化版 GoReleaser 配置 - DockerHub 未配置时使用
# 仍然上传 linux/amd64 二进制包，保证后台自更新可以找到兼容资产。
version: 2

project_name: sub2api

before:
  hooks:
    - go mod tidy -C backend

builds:
  - id: sub2api
    dir: backend
    main: ./cmd/server
    binary: sub2api
    flags:
      - -tags=embed
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
    ldflags:
      - -s -w
      - -X main.Commit={{.Commit}}
      - -X main.Date={{.Date}}
      - -X main.BuildType=release

archives:
  - id: default
    format: tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - LICENSE*
      - README*
      - deploy/*

checksum:
  name_template: 'checksums.txt'
  algorithm: sha256

changelog:
  disable: true

# 仅 GHCR x86_64 镜像，不构建 DockerHub 镜像，避免 skip/sub2api 无效 tag
dockers:
  - id: ghcr-amd64
    goos: linux
    goarch: amd64
    image_templates:
      - "ghcr.io/{{ .Env.GITHUB_REPO_OWNER_LOWER }}/sub2api:{{ .Version }}-amd64"
      - "ghcr.io/{{ .Env.GITHUB_REPO_OWNER_LOWER }}/sub2api:{{ .Version }}"
      - "ghcr.io/{{ .Env.GITHUB_REPO_OWNER_LOWER }}/sub2api:latest"
    dockerfile: Dockerfile.goreleaser
    use: buildx
    extra_files:
      - deploy/docker-entrypoint.sh
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .Commit }}"
      - "--label=org.opencontainers.image.source=https://github.com/{{ .Env.GITHUB_REPO_OWNER }}/{{ .Env.GITHUB_REPO_NAME }}"

# 单架构镜像不需要 manifest
docker_manifests: []

release:
  github:
    owner: "{{ .Env.GITHUB_REPO_OWNER }}"
    name: "{{ .Env.GITHUB_REPO_NAME }}"
  draft: false
  prerelease: auto
  name_template: "Sub2API {{.Version}} (Simple)"
  header: |
    > AI API Gateway Platform - 将 AI 订阅配额分发和管理
    > ⚡ Simple Release: GHCR x86_64 镜像 + linux/amd64 自更新包

    {{ .Env.TAG_MESSAGE }}

  footer: |
    ---

    ## 📥 Installation

    **Docker (x86_64 only):**
    ```bash
    docker pull ghcr.io/{{ .Env.GITHUB_REPO_OWNER_LOWER }}/sub2api:{{ .Version }}
    ```

    **Self-update asset:**
    GitHub Release includes `sub2api_{{ .Version }}_linux_amd64.tar.gz` for admin panel self-update.

    ## 📚 Documentation

    - [GitHub Repository](https://github.com/{{ .Env.GITHUB_REPO_OWNER }}/{{ .Env.GITHUB_REPO_NAME }})
